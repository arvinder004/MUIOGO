name: Test Solver Discovery

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'API/Classes/Case/OsemosysClass.py'
      - 'API/Classes/Base/Config.py'
      - 'tests/test_solver_discovery.py'
      - 'tests/conftest.py'
      - '.github/workflows/test-solver-discovery.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'API/Classes/Case/OsemosysClass.py'
      - 'API/Classes/Base/Config.py'
      - 'tests/test_solver_discovery.py'
      - 'tests/conftest.py'
      - '.github/workflows/test-solver-discovery.yml'
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.os }} - Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        pip install -r requirements.txt
    
    - name: Run solver discovery tests
      run: |
        pytest tests/test_solver_discovery.py -v --cov=API/Classes/Case/OsemosysClass --cov-report=term-missing
    
    - name: Upload coverage reports
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: solver-discovery
        name: solver-discovery-coverage
      continue-on-error: true
    
    - name: Test summary
      if: always()
      run: |
        echo "### Test Results for ${{ matrix.os }} - Python ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY
        echo "✅ Solver discovery tests completed" >> $GITHUB_STEP_SUMMARY
